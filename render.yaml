services:
  - type: web
    name: presidential-gilsu-long-upbit
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EXCHANGE_ID
        value: upbit
      - key: QUOTE
        value: KRW
      - key: SCAN_TIMEFRAMES
        value: 1h
      - key: SCAN_SYMBOL_LIMIT
        value: 40
      - key: BTC_BENCHMARK
        value: BTC/KRW
      - key: PYTHON_VERSION
        value: 3.11.9
