services:
  - type: web
    name: perfect-coin-scanner-upbit-long
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: UPBIT_BASE_URL
        value: https://api.upbit.com
      - key: SCAN_MARKET_LIMIT_MAIN
        value: "60"
      - key: SCAN_MARKET_LIMIT_SUB
        value: "120"
      - key: TOP_PICK_COUNT
        value: "8"
